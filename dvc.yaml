stages:
  preprocess:
    cmd: python src/preprocess.py
    deps:
    - data/raw/data.csv
    - src/preprocess.py
    params:
    - preprocess.input
    - preprocess.output
    outs:
    - data/processed/data.csv

  train:
    cmd: python src/train.py
    deps:
    - data/raw/data.csv
    - src/train.py
    params:
    - train.data
    - train.max_depth
    - train.model
    - train.n_estimators
    - train.random_state
    outs:
    - models/model.pkl

  evaluate:
    cmd: python src/evaluate.py
    deps:
    - data/raw/data.csv
    - models/model.pkl
    - src/evaluate.py

  monitor:
    cmd: python src/monitor.py
    deps:
    - data/raw/data.csv
    - models/model.pkl
    - src/monitor.py
    outs:
    # cache: false means DVC will NOT try to pull these from S3.
    # They are regenerated fresh on every pipeline run.
    - reports/data_drift_report.html:
        cache: false
    - reports/evidently_summary.json:
        cache: false
